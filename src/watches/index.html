<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ItineraryWatch - Watches</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="preconnect" href="https://api.itinerarywatch.com" crossorigin="use-credentials">

        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=block" rel="stylesheet" crossorigin="anonymous">
        <link rel="stylesheet" href="/watches/css/index.css">

        <script src="/watches/js/table_sorter.js" defer></script>
        <script src="/watches/js/api_user.js" defer></script>
        <script src="/watches/js/api_watches.js" defer></script>
        <script src="/watches/js/index.js" defer></script>
    </head>
    <body>
        <h1>ItineraryWatch</h1>

        <div id="div_id_dynamic_data">
            <p><strong>User</strong>: <span class="span_class_user_email"></span></p>

            <nav aria-label="Breadcrumb" class="breadcrumb-nav">
                <span class="nav-link" id="a_breadcrumb_watches">Watches</span> 
                <span id="span_breadcrumb_separator" class="breadcrumb-separator" style="display: none;">›</span> 
                <span id="span_breadcrumb_uuid" class="breadcrumb-current"></span>
            </nav>

            <div id="div_id_dynamic_data_all_searches">
                <table>
                    <thead>
                        <tr>
                            <th scope="col" class="sortable-header">Search Name</th>
                            <th scope="col" class="sortable-header">Cruise Line</th>
                            <th scope="col" class="sortable-header">Sailings</th>
                            <th scope="col" class="sortable-header">Search Last Updated</th>
                            <th scope="col" class="sortable-header">Search Results Last Updated</th>
                            <th scope="col" class="sortable-header">Search Last Checked</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>

            <div id="div_id_dynamic_data_single_search">
                <h3>Summary:</h3>
                <table>
                    <tbody>
                        <tr>
                            <th scope="row">Search Name:</th>
                            <td id="td_id_summary_name"></td>
                        </tr>
                        <tr>
                            <th scope="row">Search URL:</th>
                            <td id="td_id_summary_url"></td>
                        </tr>
                        <tr>
                            <th scope="row">Search Last Updated:</th>
                            <td id="td_id_summary_search_last_updated"></td>
                        </tr>
                        <tr>
                            <th scope="row">Search Contents Last Changed:</th>
                            <td id="td_id_summary_search_contents_last_changed"></td>
                        </tr>
                        <tr>
                            <th scope="row">Search Last Run:</th>
                            <td id="td_id_summary_search_last_run"></td>
                        </tr>
                        <tr>
                            <th scope="row">Matching Itineraries:</th>
                            <td id="td_id_summary_matching_itineraries"></td>
                        </tr>
                    </tbody>
                </table>

                <h3>Itineraries Returned By Search:</h3>
            </div>
        </div>
    </body>
</html>
